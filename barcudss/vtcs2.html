<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTC Turnover Disparity</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #38bdf8;
            padding: 12px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        polyline {
            opacity: .3;
            stroke: #94a3b8;
            stroke-width: 1px;
            fill: none;
        }
        .label {
            font-size: 11px;
            fill: #cbd5e1;
            font-weight: 600;
        }
        #download-btn {
            margin-top: 25px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        #download-btn:hover { background: #7dd3fc; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">VTC Turnover Disparity</div>
        <div class="subtitle">Proportion of entities by annual turnover bracket</div>
        <div id="viz"></div>
        <button id="download-btn">📸 Export Visualization</button>
    </div>

    <script>
        // 1. Data Structure
        const data = [
            { label: "0 - 15k€", value: 25, color: "#64748b", desc: "Part-timers / Side-hustle" },
            { label: "15k - 45k€", value: 50, color: "#38bdf8", desc: "Standard Full-time Indep." },
            { label: "45k - 77.7k€", value: 15, color: "#818cf8", desc: "Top-tier Independents" },
            { label: "77.7k - 250k€", value: 8, color: "#c084fc", desc: "Small Multi-car Fleets" },
            { label: "> 250k€", value: 2, color: "#fb7185", desc: "Large Transport Operators" }
        ];

        const width = 600, height = 450, margin = 40;
        const radius = Math.min(width, height) / 2 - margin;

        const svg = d3.select("#viz")
            .append("svg")
            .attr("id", "disparity-svg")
            .attr("width", width)
            .attr("height", height)
            .style("background-color", "#1e293b")
            .append("g")
            .attr("transform", `translate(${width / 2},${height / 2})`);

        // 2. Generators
        const pie = d3.pie().value(d => d.value).sort(null);
        const arc = d3.arc().innerRadius(radius * 0.5).outerRadius(radius * 0.8);
        const outerArc = d3.arc().innerRadius(radius * 0.9).outerRadius(radius * 0.9);

        // 3. Tooltip
        const tooltip = d3.select("body").append("div").attr("class", "tooltip").style("opacity", 0);

        // 4. Draw Slices
        svg.selectAll('path')
            .data(pie(data))
            .join('path')
            .attr('d', arc)
            .attr('fill', d => d.data.color)
            .attr("stroke", "#1e293b")
            .style("stroke-width", "3px")
            .style("opacity", 0.8)
            .on("mouseover", function(event, d) {
                d3.select(this).style("opacity", 1).attr("transform", "scale(1.05)");
                tooltip.transition().duration(200).style("opacity", 1);
                tooltip.html(`<strong>${d.data.label}</strong><br/>Proportion: ${d.data.value}%<br/><em>${d.data.desc}</em>`)
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 28) + "px");
            })
            .on("mouseout", function() {
                d3.select(this).style("opacity", 0.8).attr("transform", "scale(1)");
                tooltip.transition().duration(500).style("opacity", 0);
            });

        // 5. Add Labels & Lines
        svg.selectAll('polyline')
            .data(pie(data))
            .join('polyline')
            .attr('points', function(d) {
                const posA = arc.centroid(d);
                const posB = outerArc.centroid(d);
                const posC = outerArc.centroid(d);
                const midangle = d.startAngle + (d.endAngle - d.startAngle) / 2;
                posC[0] = radius * 0.95 * (midangle < Math.PI ? 1 : -1);
                return [posA, posB, posC];
            });

        svg.selectAll('text')
            .data(pie(data))
            .join('text')
            .text(d => `${d.data.label} (${d.data.value}%)`)
            .attr('transform', function(d) {
                const pos = outerArc.centroid(d);
                const midangle = d.startAngle + (d.endAngle - d.startAngle) / 2;
                pos[0] = radius * 0.99 * (midangle < Math.PI ? 1 : -1);
                return `translate(${pos})`;
            })
            .style('text-anchor', d => {
                const midangle = d.startAngle + (d.endAngle - d.startAngle) / 2;
                return (midangle < Math.PI ? 'start' : 'end');
            })
            .attr("class", "label");

        // 6. Center Text (Total Market Concept)
        svg.append("text")
            .attr("text-anchor", "middle")
            .attr("dy", "-0.5em")
            .attr("fill", "#94a3b8")
            .style("font-size", "12px")
            .text("MARKET");
        svg.append("text")
            .attr("text-anchor", "middle")
            .attr("dy", "0.8em")
            .attr("fill", "#ffffff")
            .style("font-size", "20px")
            .style("font-weight", "bold")
            .text("SPLIT");

        // 7. Export Functionality
        document.getElementById('download-btn').addEventListener('click', () => {
            const svgEl = document.getElementById('disparity-svg');
            const xml = new XMLSerializer().serializeToString(svgEl);
            const svg64 = btoa(unescape(encodeURIComponent(xml)));
            const b64Start = 'data:image/svg+xml;base64,';
            const image64 = b64Start + svg64;

            const canvas = document.createElement("canvas");
            canvas.width = width * 2;
            canvas.height = height * 2;
            const ctx = canvas.getContext("2d");
            ctx.scale(2,2);

            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const link = document.createElement("a");
                link.download = "vtc_turnover_disparity.png";
                link.href = canvas.toDataURL("image/png");
                link.click();
            };
            img.src = image64;
        });
    </script>
</body>
</html>
