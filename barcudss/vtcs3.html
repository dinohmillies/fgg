<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTC Turnover Distribution</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .chart-wrapper {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-top: 20px;
        }
        .legend-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .legend-item.active {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateX(5px);
        }
        .color-box {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }
        .legend-text { font-size: 13px; color: #94a3b8; }
        .legend-value { font-weight: bold; color: #f8fafc; margin-left: auto; padding-left: 15px;}
        
        .title { font-size: 22px; font-weight: 800; color: #38bdf8; margin: 0; }
        .subtitle { color: #64748b; font-size: 13px; margin-bottom: 10px; }
        
        #download-btn {
            margin-top: 25px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Turnover Disparity</h1>
        <p class="subtitle">Global VTC Market Segmentation by Revenue</p>
        
        <div class="chart-wrapper">
            <div id="viz"></div>
            
            <div id="legend" class="legend-container"></div>
        </div>

        <button id="download-btn">📸 Save Report</button>
    </div>

    <script>
        const data = [
            { id: "p1", label: "0 - 15k€", value: 25, color: "#64748b", desc: "Part-time" },
            { id: "p2", label: "15k - 45k€", value: 50, color: "#38bdf8", desc: "Standard" },
            { id: "p3", label: "45k - 77.7k€", value: 15, color: "#818cf8", desc: "Top Indep." },
            { id: "p4", label: "77.7k - 250k€", value: 8, color: "#c084fc", desc: "Fleets" },
            { id: "p5", label: "> 250k€", value: 2, color: "#fb7185", desc: "Operators" }
        ];

        const width = 350, height = 350;
        const radius = Math.min(width, height) / 2;

        const svg = d3.select("#viz")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .append("g")
            .attr("transform", `translate(${width/2},${height/2})`);

        const pie = d3.pie().value(d => d.value).sort(null);
        const arc = d3.arc().innerRadius(radius * 0.6).outerRadius(radius * 0.9);
        const arcHover = d3.arc().innerRadius(radius * 0.6).outerRadius(radius * 0.95);

        // Build Legend
        const legend = d3.select("#legend");
        const legendItems = legend.selectAll(".legend-item")
            .data(data)
            .enter()
            .append("div")
            .attr("class", "legend-item")
            .attr("id", d => `legend-${d.id}`)
            .html(d => `
                <div class="color-box" style="background:${d.color}"></div>
                <div class="legend-text">${d.label} <br/><small>${d.desc}</small></div>
                <div class="legend-value">${d.value}%</div>
            `);

        // Draw Slices
        const path = svg.selectAll("path")
            .data(pie(data))
            .enter()
            .append("path")
            .attr("d", arc)
            .attr("fill", d => d.data.color)
            .attr("stroke", "#1e293b")
            .style("stroke-width", "4px")
            .style("cursor", "pointer")
            .on("mouseover", function(event, d) {
                highlight(d.data.id);
            })
            .on("mouseout", dehighlight);

        // Legend Hover interactions
        legendItems.on("mouseover", (event, d) => highlight(d.id))
                   .on("mouseout", dehighlight);

        function highlight(id) {
            // Highlight Slice
            path.transition().duration(200)
                .attr("d", d => d.data.id === id ? arcHover : arc)
                .style("opacity", d => d.data.id === id ? 1 : 0.4);
            
            // Highlight Legend Row
            d3.selectAll(".legend-item").classed("active", false);
            d3.select(`#legend-${id}`).classed("active", true);
        }

        function dehighlight() {
            path.transition().duration(200).attr("d", arc).style("opacity", 1);
            d3.selectAll(".legend-item").classed("active", false);
        }

        // Simple center text
        svg.append("text")
            .attr("text-anchor", "middle")
            .attr("dy", "0.35em")
            .style("fill", "#94a3b8")
            .style("font-size", "14px")
            .style("font-weight", "bold")
            .text("REVENUE");

    </script>
</body>
</html>
